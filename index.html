<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64-Secret-O-Matic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; margin: 0; justify-content: center; }
        .container { max-width: 700px; width: 100%; background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { color: #03dac6; text-align: center; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #bb86fc; font-size: 0.9em; }
        textarea { width: 100%; height: 150px; background: #2d2d2d; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 12px; box-sizing: border-box; margin-bottom: 5px; resize: none; font-family: monospace; }
        input[type="password"], input[type="file"] { width: 100%; padding: 12px; margin-bottom: 20px; background: #2d2d2d; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: all 0.2s ease; }
        .btn-enc { background: #03dac6; color: #000; }
        .btn-dec { background: #bb86fc; color: #000; }
        .btn-copy { background: #444; color: #fff; grid-column: span 2; margin-top: 10px; font-size: 0.8em; padding: 8px; }
        button:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        button:active { transform: translateY(0); }
        .stats { font-size: 0.75em; color: #888; margin-bottom: 15px; text-align: right; }
        ::placeholder { color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔒 Secret Vault</h2>
    
    <label>📂 Carica Foto (opzionale)</label>
    <input type="file" id="fileInput" accept="image/*">

    <label>📝 Testo o Codice Criptato</label>
    <textarea id="textInput" placeholder="Incolla qui il segreto o scrivi un messaggio..."></textarea>
    <div id="charCount" class="stats">Caratteri: 0</div>

    <label>🔑 Chiave di Accesso</label>
    <input type="password" id="password" placeholder="Inserisci la password">

    <div class="grid">
        <button class="btn-enc" onclick="handleAction(true)">Cripta</button>
        <button class="btn-dec" onclick="handleAction(false)">Decripta</button>
        <button class="btn-copy" onclick="copyToClipboard()">Copia Risultato negli Appunti</button>
    </div>
</div>

<script>
    const input = document.getElementById('textInput');
    const charCount = document.getElementById('charCount');

    // Listener per aggiornare il contatore in tempo reale
    input.addEventListener('input', () => {
        charCount.innerText = `Caratteri: ${input.value.length}`;
    });

    // Gestore caricamento immagine
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (ev) => {
            input.value = ev.target.result;
            charCount.innerText = `Caratteri (Immagine Base64): ${input.value.length}`;
        };
        reader.readAsDataURL(file);
    });

    function handleAction(isEncrypting) {
        const data = input.value.trim();
        const pass = document.getElementById('password').value;

        if (!data || !pass) {
            alert("⚠️ Password e contenuto sono obbligatori!");
            return;
        }

        try {
            if (isEncrypting) {
                // AES produce un oggetto che convertito in stringa è già Base64
                const encrypted = CryptoJS.AES.encrypt(data, pass).toString();
                input.value = encrypted;
            } else {
                const bytes = CryptoJS.AES.decrypt(data, pass);
                const decrypted = bytes.toString(CryptoJS.enc.Utf8);
                
                if (!decrypted) throw new Error();
                input.value = decrypted;
            }
            charCount.innerText = `Caratteri: ${input.value.length}`;
        } catch (e) {
            alert("❌ Errore! Password errata o formato non valido.");
        }
    }

    function copyToClipboard() {
        input.select();
        document.execCommand('copy');
        const btn = document.querySelector('.btn-copy');
        const originalText = btn.innerText;
        btn.innerText = "✅ Copiato!";
        btn.style.background = "#03dac6";
        btn.style.color = "#000";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "#444";
            btn.style.color = "#fff";
        }, 2000);
    }
</script>

</body>
</html>

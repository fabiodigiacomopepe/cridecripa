<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short-Secret-O-Matic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { max-width: 700px; width: 100%; background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #bb86fc; text-align: center; }
        textarea { width: 100%; height: 120px; background: #2d2d2d; color: #fff; border: 1px solid #333; border-radius: 8px; padding: 10px; box-sizing: border-box; margin-bottom: 10px; resize: vertical; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #2d2d2d; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-enc { background: #03dac6; color: #000; }
        .btn-dec { background: #bb86fc; color: #000; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        .stats { font-size: 0.75em; color: #888; margin-top: 5px; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔒 Criptatore Compatto</h2>
    
    <label>Carica Immagine:</label>
    <input type="file" id="fileInput" accept="image/*">

    <label>Testo / Output Criptato:</label>
    <textarea id="textInput" placeholder="Inserisci qui il testo o l'output compresso..."></textarea>
    <div id="charCount" class="stats">Caratteri: 0</div>

    <input type="password" id="password" placeholder="Password segreta">

    <div class="grid">
        <button class="btn-enc" onclick="process(true)">Comprimi & Cripta</button>
        <button class="btn-dec" onclick="process(false)">Decripta & Espandi</button>
    </div>
</div>

<script>
    const input = document.getElementById('textInput');
    const charCount = document.getElementById('charCount');

    // Aggiorna il counter caratteri
    input.addEventListener('input', () => {
        charCount.innerText = `Caratteri: ${input.value.length}`;
    });

    // Leggi immagine
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            input.value = ev.target.result;
            charCount.innerText = `Caratteri (Base64 foto): ${input.value.length}`;
        };
        reader.readAsDataURL(file);
    });

    function process(isEncrypting) {
        const data = input.value;
        const pass = document.getElementById('password').value;

        if (!data || !pass) return alert("Inserisci sia i dati che la password!");

        try {
            if (isEncrypting) {
                // 1. Cripta con AES
                const encrypted = CryptoJS.AES.encrypt(data, pass).toString();
                // 2. Comprime il risultato criptato usando UTF-16 (molto più corto del Base64)
                const compressed = LZString.compressToUTF16(encrypted);
                input.value = compressed;
                alert("Criptato e Compresso!");
            } else {
                // 1. Decomprime
                const decompressed = LZString.decompressFromUTF16(data);
                if (!decompressed) throw new Error("Compressione non valida");
                // 2. Decripta
                const bytes = CryptoJS.AES.decrypt(decompressed, pass);
                const original = bytes.toString(CryptoJS.enc.Utf8);
                if (!original) throw new Error("Password errata");
                
                input.value = original;
            }
            charCount.innerText = `Caratteri: ${input.value.length}`;
        } catch (e) {
            alert("Errore: dati corrotti o password sbagliata.");
        }
    }
</script>

</body>
</html>
